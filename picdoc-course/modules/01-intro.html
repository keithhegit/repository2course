<section class="module" id="module-1" style="background: var(--color-bg-warm)">
  <div class="module-content">
    <header class="module-header animate-in">
      <span class="module-number">1</span>
      <h1 class="module-title">产品与价值</h1>
      <p class="module-subtitle">PicDoc 把长文本一键转成信息图和结构图，用于表达、脑暴、笔记和团队协作。</p>
    </header>
    <div class="module-body">
      <section class="screen animate-in">
        <h2 class="screen-heading">代码与规则片段</h2>
        <div class="translation-block animate-in">
          <div class="translation-code"><span class="translation-label">CODE</span><pre><code>
<span class="code-line">文本转视觉</span>
<span class="code-line">支持导出文档和图片</span>
<span class="code-line">适配 Word / PPT 场景</span>
<span class="code-line">多语种内容管理</span>
          </code></pre></div>
          <div class="translation-english"><span class="translation-label">PLAIN ENGLISH</span><div class="translation-lines">
            <p class="tl">这一段是项目最值得先读懂的能力边界。</p>
            <p class="tl">先确认主链路，再决定扩展与改造路径。</p>
          </div></div>
        </div>
      </section>
      <section class="screen animate-in">
        <h2 class="screen-heading">应用测验</h2>
        <div class="quiz-container" id="quiz-module-1">
          <div class="quiz-question-block" data-correct="option-b" data-explanation-right="对，优先建立最小可用认知链路，后续排障成本最低。" data-explanation-wrong="再想一步：先确保主路径可运行，才能定位真实瓶颈。">
            <h3 class="quiz-question">接手 PicDoc 互动拆解课 时，第一步最该确认什么？</h3>
            <div class="quiz-options">
              <button class="quiz-option" data-value="option-a" onclick="selectOption(this)"><div class="quiz-option-radio"></div><span>先统一 UI 主题和动画</span></button>
              <button class="quiz-option" data-value="option-b" onclick="selectOption(this)"><div class="quiz-option-radio"></div><span>先验证 `团队白板协作示意` 对应的最小可运行链路</span></button>
              <button class="quiz-option" data-value="option-c" onclick="selectOption(this)"><div class="quiz-option-radio"></div><span>先拆目录再补文档</span></button>
            </div>
            <div class="quiz-feedback"></div>
          </div>
          <button class="quiz-check-btn" onclick="checkQuiz('quiz-module-1')">Check Answers</button>
          <button class="quiz-reset-btn" onclick="resetQuiz('quiz-module-1')">Try Again</button>
        </div>
      </section>
    </div>
  </div>
</section>

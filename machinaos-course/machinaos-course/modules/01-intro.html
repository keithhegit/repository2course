<section class="module" id="module-1" style="background: var(--color-bg-warm)">

      <h1 class="module-title">产品与价值</h1>

    </header>
    <div class="module-body">
      <section class="screen animate-in">
        <h2 class="screen-heading">代码与规则片段</h2>

<span class="code-line">npm install -g machinaos</span>
<span class="code-line">machina start</span>

            <p class="tl">先确认主链路，再决定扩展与改造路径。</p>
          </div></div>

            <div class="quiz-options">

              <button class="quiz-option" data-value="option-b" onclick="selectOption(this)"><div class="quiz-option-radio"></div><span>先跑通 npm install -g 相关主路径</span></button>
              <button class="quiz-option" data-value="option-c" onclick="selectOption(this)"><div class="quiz-option-radio"></div><span>先上线再排查</span></button>
            </div>
            <div class="quiz-feedback"></div>
          </div>
          <button class="quiz-check-btn" onclick="checkQuiz('quiz-module-1')">Check Answers</button>
          <button class="quiz-reset-btn" onclick="resetQuiz('quiz-module-1')">Try Again</button>
